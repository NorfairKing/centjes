name: centjes-chart
version: 0.0.0
github: "NorfairKing/centjes"

extra-source-files:
- test_resources/**/*

dependencies:
- base >= 4.7 && < 5


library:
  source-dirs: src
  build-tools: autoexporter
  dependencies:
  - Chart
  - Chart-diagrams
  - centjes
  - colour
  - containers
  - diagnose
  - monad-logger
  - opt-env-conf
  - path
  - path-io
  - really-safe-money
  - text
  - time
  - validity
  - validity-time
  - validity-vector
  - vector

executables:
  centjes-chart:
    main: Main.hs
    source-dirs: app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - centjes-chart

tests:
  centjes-chart-test:
    main: Spec.hs
    source-dirs: test
    build-tools: sydtest-discover
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - centjes
    - centjes-chart
    - centjes-gen
    - containers
    - genvalidity
    - genvalidity-sydtest
    - genvalidity-time
    - genvalidity-vector
    - monad-logger
    - path
    - path-io
    - really-safe-money
    - really-safe-money-gen
    - sydtest
    - time
    - vector

