# Mutation-plugin config used by every in-repo centjes mutation check.
#
# Schema: Test.Syd.Mutation.Plugin.OptParse.MutationPluginConfig
# Passed to the plugin via '--config=PATH' by sydtest.mutationCheck.
#
# As the first report is triaged, add `ignore:` entries for no-op markers and
# `operators.<Op>.skip-calls-to` for equivalent/unkillable mutants.
debug: false

operators:
  # Most [Char]/String list literals are human-facing description/error text
  # (e.g. the `declare "..."` messages in Validity instances) that no test
  # asserts the exact contents of.  Emptying them to "" produces equivalent,
  # uncovered noise rather than a signal about the test suite; skip them and
  # keep genuine `[a]` (a /= Char) list mutations.
  ConstEmptyList:
    skip-strings: true

# Modules excluded from instrumentation entirely. The parser is generated by
# Alex/Happy, not hand-written, so mutating it is noise rather than a signal
# about our test suite.
exceptions:
  - Centjes.Parse.Alex
  - Centjes.Parse.Happy
